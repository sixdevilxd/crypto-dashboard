<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Token Sniper - Deteksi Token Baru Real-Time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255, 0, 255, 0.3);
        }

        header h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        header p {
            color: #aaa;
            font-size: 1.1em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* CHAIN SELECTOR */
        .chain-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chain-btn {
            padding: 12px 24px;
            border: 2px solid #444;
            background: rgba(50, 50, 100, 0.5);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .chain-btn:hover {
            border-color: #ff006e;
            background: rgba(255, 0, 110, 0.2);
        }

        .chain-btn.active {
            background: linear-gradient(45deg, #ff006e, #8338ec);
            border-color: #ff006e;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff006e, #8338ec);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-input {
            padding: 10px 15px;
            background: rgba(50, 50, 100, 0.5);
            border: 2px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95em;
        }

        .filter-input::placeholder {
            color: #888;
        }

        .filter-input:focus {
            outline: none;
            border-color: #ff006e;
            background: rgba(50, 50, 100, 0.8);
        }

        /* TOKEN GRID */
        .token-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .token-card {
            background: rgba(50, 50, 100, 0.3);
            border: 2px solid rgba(255, 0, 110, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .token-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .token-card:hover {
            border-color: #ff006e;
            background: rgba(50, 50, 100, 0.6);
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.3);
            transform: translateY(-5px);
        }

        .token-card:hover::before {
            left: 100%;
        }

        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .token-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #ff006e;
        }

        .token-symbol {
            background: rgba(255, 0, 110, 0.2);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            color: #ff006e;
        }

        .token-price {
            font-size: 1.8em;
            font-weight: bold;
            color: #3a86ff;
            margin: 10px 0;
        }

        .token-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
            font-size: 0.9em;
        }

        .info-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 6px;
        }

        .info-label {
            color: #aaa;
            font-size: 0.85em;
        }

        .info-value {
            color: #fff;
            font-weight: bold;
            margin-top: 5px;
        }

        .token-chain {
            display: inline-block;
            background: rgba(58, 134, 255, 0.2);
            color: #3a86ff;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            margin-top: 10px;
        }

        .token-time {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .token-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .token-actions button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-view {
            background: rgba(58, 134, 255, 0.3);
            color: #3a86ff;
            border: 1px solid #3a86ff;
        }

        .btn-view:hover {
            background: rgba(58, 134, 255, 0.5);
        }

        .btn-copy {
            background: rgba(255, 0, 110, 0.3);
            color: #ff006e;
            border: 1px solid #ff006e;
        }

        .btn-copy:hover {
            background: rgba(255, 0, 110, 0.5);
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid rgba(255, 0, 110, 0.2);
            border-top: 4px solid #ff006e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }

        .empty-state h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #fff;
        }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(50, 50, 100, 0.3);
            border: 2px solid rgba(255, 0, 110, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #3a86ff;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.9em;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .token-grid {
                grid-template-columns: 1fr;
            }

            .chain-selector {
                justify-content: flex-start;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>🚀 TOKEN SNIPER</h1>
            <p>Deteksi Token Baru Real-Time di Base, Solana, Ethereum, Arbitrum</p>
        </header>

        <!-- STATS -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTokens">0</div>
                <div class="stat-label">Total Token Ditemukan</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalLiquidity">\$0</div>
                <div class="stat-label">Total Liquidity</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgPrice">\$0</div>
                <div class="stat-label">Harga Rata-rata</div>
            </div>
        </div>

        <!-- CHAIN SELECTOR -->
        <div class="chain-selector">
            <button class="chain-btn active" onclick="selectChain('base')">⚪ Base</button>
            <button class="chain-btn" onclick="selectChain('solana')">◆ Solana</button>
            <button class="chain-btn" onclick="selectChain('ethereum')">◈ Ethereum</button>
            <button class="chain-btn" onclick="selectChain('arbitrum')">▲ Arbitrum</button>
        </div>

        <!-- FILTERS -->
        <div class="filters">
            <input 
                type="text" 
                class="filter-input" 
                id="searchInput" 
                placeholder="🔍 Cari token..."
                onkeyup="filterTokens()"
            >
            <select class="filter-input" id="sortBy" onchange="sortTokens()">
                <option value="newest">Terbaru</option>
                <option value="price-high">Harga Tertinggi</option>
                <option value="price-low">Harga Terendah</option>
                <option value="liquidity">Liquidity Terbesar</option>
            </select>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <button class="btn btn-primary" id="refreshBtn" onclick="refreshTokens()">
                🔄 Refresh
            </button>
            <button class="btn btn-primary" onclick="startAutoRefresh()">
                ⏱️ Auto Refresh (10s)
            </button>
            <button class="btn btn-primary" onclick="stopAutoRefresh()">
                ⏹️ Stop Auto
            </button>
        </div>

        <!-- TOKEN GRID -->
        <div class="token-grid" id="tokenGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Memuat token baru...</p>
            </div>
        </div>
    </div>

    <script>
        let currentChain = 'base';
        let allTokens = [];
        let autoRefreshInterval = null;

        // CHAIN DATA
        const chainData = {
            base: {
                name: 'Base',
                icon: '⚪',
                color: '#3a86ff',
                apiUrl: 'https://api.dexscreener.com/latest/dex/tokens/base'
            },
            solana: {
                name: 'Solana',
                icon: '◆',
                color: '#14f195',
                apiUrl: 'https://api.dexscreener.com/latest/dex/tokens/solana'
            },
            ethereum: {
                name: 'Ethereum',
                icon: '◈',
                color: '#627eea',
                apiUrl: 'https://api.dexscreener.com/latest/dex/tokens/ethereum'
            },
            arbitrum: {
                name: 'Arbitrum',
                icon: '▲',
                color: '#28a0f0',
                apiUrl: 'https://api.dexscreener.com/latest/dex/tokens/arbitrum'
            }
        };

        // SELECT CHAIN
        function selectChain(chain) {
            currentChain = chain;
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            allTokens = [];
            refreshTokens();
        }

        // FETCH TOKENS
        async function refreshTokens() {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.disabled = true;
            refreshBtn.textContent = '⏳ Loading...';

            try {
                const response = await fetch(chainData[currentChain].apiUrl);
                const data = await response.json();
                
                // Filter dan process tokens
                allTokens = (data.pairs || [])
                    .filter(pair => {
                        // Filter token baru (dibuat dalam 24 jam terakhir)
                        const createdTime = new Date(pair.pairCreatedAt || Date.now());
                        const now = new Date();
                        const diffHours = (now - createdTime) / (1000 * 60 * 60);
                        return diffHours < 24;
                    })
                    .map(pair => ({
                        id: pair.pairAddress,
                        name: pair.baseToken?.name || 'Unknown',
                        symbol: pair.baseToken?.symbol || 'N/A',
                        address: pair.baseToken?.address || pair.pairAddress,
                        price: parseFloat(pair.priceUsd) || 0,
                        liquidity: parseFloat(pair.liquidity?.usd) || 0,
                        volume24h: parseFloat(pair.volume?.h24) || 0,
                        priceChange24h: parseFloat(pair.priceChange?.h24) || 0,
                        createdAt: pair.pairCreatedAt || new Date().toISOString(),
                        chain: currentChain,
                        dexUrl: pair.url || '#'
                    }))
                    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
                    .slice(0, 50); // Ambil 50 token terbaru

                updateStats();
                displayTokens(allTokens);
            } catch (error) {
                console.error('Error fetching tokens:', error);
                document.getElementById('tokenGrid').innerHTML = `
                    <div class="empty-state">
                        <h2>⚠️ Error</h2>
                        <p>Gagal memuat token. Coba refresh lagi.</p>
                    </div>
                `;
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '🔄 Refresh';
            }
        }

        // UPDATE STATS
        function updateStats() {
            const totalTokens = allTokens.length;
            const totalLiquidity = allTokens.reduce((sum, t) => sum + t.liquidity, 0);
            const avgPrice = totalTokens > 0 
                ? allTokens.reduce((sum, t) => sum + t.price, 0) / totalTokens 
                : 0;

            document.getElementById('totalTokens').textContent = totalTokens;
            document.getElementById('totalLiquidity').textContent = '$' + formatNumber(totalLiquidity);
            document.getElementById('avgPrice').textContent = '$' + avgPrice.toFixed(8);
        }

        // DISPLAY TOKENS
        function displayTokens(tokens) {
            const grid = document.getElementById('tokenGrid');

            if (tokens.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h2>😴 Belum Ada Token</h2>
                        <p>Tidak ada token baru ditemukan. Coba refresh atau ganti chain.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = tokens.map(token => `
                <div class="token-card">
                    <div class="token-header">
                        <div>
                            <div class="token-name">${escapeHtml(token.name)}</div>
                            <span class="token-symbol">${escapeHtml(token.symbol)}</span>
                        </div>
                    </div>

                    <div class="token-price">$${token.price.toFixed(8)}</div>

                    <div class="token-info">
                        <div class="info-item">
                            <div class="info-label">
